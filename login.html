<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Student Login</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body class="bodys">
    <div class="container">
  <h1 class="jeffreys"> Login Form </h1>

  <form action="#" method="post" class="form">
    <div class="usernames">
      <label for="username">Username</label>
      <input
        id="username"
        name="username"
        type="text"
        placeholder="Enter your username"
        required
      />
    </div>

    <div class="passwords">
      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        placeholder="Enter your password"
        required
      />
    </div>

    <button type="submit" class="yohh">Login</button>
  </form>
  </div>
</body>
</html>
